name: opencode-fallback
# Manual fallback: /opencode commands in comments
# Primary orchestration is handled by Hermes dispatcher (webhook)

on:
  issue_comment:
    types: [created]

jobs:
  handle-command:
    if: contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Parse and execute
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek-v4-flash
          use_github_token: true
          prompt: |
            Execute the command from: ${{ github.event.comment.body }}
            Issue context: #${{ github.event.issue.number }}
            Follow the standard workflow defined in AGENTS.md.
