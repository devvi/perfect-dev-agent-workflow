name: review
# CI testing — runs ONLY on implement-stage PRs
# Self-healing IS handled by PiBot Dispatcher (reads CI logs, fixes via OpenCode Serve)
# This workflow only tests, reports, and gates the merge.

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-and-report:
    if: contains(github.event.pull_request.labels.*.name, 'workflow/implement')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Run tests
        id: test
        run: |
          npm test 2>&1 | tee test-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload test output artifact
        if: steps.test.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ github.event.pull_request.number }}
          path: test-output.log
          retention-days: 3

      - name: Comment failure summary on PR
        if: steps.test.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            var fs = require('fs');
            var output = fs.readFileSync('test-output.log', 'utf8');
            var lines = output.split('\n');
            var failLines = lines.filter(function(l) {
              return l.includes('FAIL') || l.includes('AssertionError') || l.includes('failed');
            });
            var summary = failLines.slice(-15).join('\n').substring(0, 1000);
            var baseUrl = process.env.GITHUB_SERVER_URL || 'https://github.com';
            var runUrl = baseUrl + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID;
            var body = 'Tests FAILED - PiBot will auto-fix\n\n```\n' + (summary || 'See run logs') + '\n```\n\n' + runUrl;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Install Playwright browsers
        if: success() || failure()
        run: npx playwright install chromium 2>&1

      - name: E2E Play Test
        id: playtest
        if: success() || failure()
        run: npm run test:e2e
        continue-on-error: true

      - name: Play Test gate
        if: steps.playtest.outcome != 'success'
        run: |
          echo "E2E Play Test failed - runtime errors found."
          exit 1

      - name: Notify Feishu
        if: always()
        env:
          STATUS: ${{ job.status }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          EMOJI="[ok]"
          [ "$STATUS" != "success" ] && EMOJI="[fail]"
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"${EMOJI} [PDA] review #${PR_NUM} ${STATUS} \\nPR: ${PR_TITLE}\"}}" \
            https://open.feishu.cn/open-apis/bot/v2/hook/390781d4-285c-4d66-afa4-1aadfb76a7b9
