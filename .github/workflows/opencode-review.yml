name: review
# CI testing — runs ONLY on implement-stage PRs
# Self-healing: test → auto-fix → push (implement PRs only)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-and-heal:
    if: contains(github.event.pull_request.labels.*.name, 'workflow/implement')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config user.name "pibot[bot]"
          git config user.email "pibot[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Run tests
        id: test
        run: |
          npm test 2>&1 | tee test-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Auto-fix failing tests
        if: steps.test.outputs.exit_code != '0'
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-flash
          use_github_token: true
          timeout-minutes: 10
          prompt: |
            Tests are failing on this branch. Read test-output.log.
            Fix ALL failures. Run `npm test` to verify.
            Commit the fixes and push to the same branch.
            Do NOT create a new PR.

      - name: Re-run tests after auto-fix
        if: steps.test.outputs.exit_code != '0'
        run: npm test
        continue-on-error: true

      - name: Install Playwright browsers
        if: success() || failure()
        run: npx playwright install chromium 2>&1

      - name: E2E Play Test 🎮
        id: playtest
        if: success() || failure()
        run: npm run test:e2e
        continue-on-error: true

      - name: Play Test gate — block merge on runtime errors
        if: steps.playtest.outcome != 'success'
        run: |
          echo "❌ Play Test failed — runtime errors found in HTML pages."
          echo "    Fix the issues (missing modules, 404s, JS errors) before merging."
          exit 1
