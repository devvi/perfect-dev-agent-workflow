name: deploy
# Vercel auto-deploy on merge to main

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Notify Feishu 💬
        if: always()
        env:
          STATUS: ${{ job.status }}
          RUN_NUM: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
        run: |
          EMOJI="✅"
          [ "$STATUS" != "success" ] && EMOJI="❌"
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"${EMOJI} [PDA] deploy #${RUN_NUM} ${STATUS} \\nBranch: ${BRANCH}\"}}" \
            https://open.feishu.cn/open-apis/bot/v2/hook/390781d4-285c-4d66-afa4-1aadfb76a7b9
