name: deploy
# Auto-deploy to Vercel ONLY when an implement PR is merged to master.
# Research/plan PR merges do NOT trigger deployment.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      pr_num:
        description: 'Merged PR number (passed by PiBot webhook)'
        required: false
        type: string

jobs:
  # Check if this push came from merging an implement PR
  check-implement:
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should_deploy }}
      pr-num: ${{ steps.check.outputs.pr_num }}
    permissions:
      pull-requests: read
    steps:
      - name: Check PR labels for workflow/implement
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR_NUM: ${{ inputs.pr_num || '' }}
        run: |
          PR_NUM="$INPUT_PR_NUM"

          if [ -z "$PR_NUM" ]; then
            COMMIT_SHA="${{ github.sha }}"
            echo "No input PR. Checking commit $COMMIT_SHA..."
            PR_NUM=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" \
              --jq '.[] | select(.state == "closed" and .merged_at != null) | .number' 2>/dev/null | head -1)
          fi

          if [ -z "$PR_NUM" ]; then
            echo "No merged PR found. Skipping deploy."
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Checking PR #$PR_NUM for workflow/implement label..."

          HAS_LABEL=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}" \
            --jq '[.labels[].name] | any(. == "workflow/implement")' 2>/dev/null)

          if [ "$HAS_LABEL" = "true" ]; then
            echo "PR #$PR_NUM has workflow/implement label → deploy!"
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "pr_num=$PR_NUM" >> $GITHUB_OUTPUT
          else
            echo "PR #$PR_NUM does NOT have workflow/implement label → skip deploy."
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: check-implement
    if: needs.check-implement.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Vercel
        id: deploy
        run: |
          npx vercel --prod --token "${{ secrets.VERCEL_TOKEN }}" \
            --scope "${{ secrets.VERCEL_ORG_ID }}" \
            --yes 2>&1 | tee /tmp/vercel-output.log
          DEPLOY_URL=$(grep -oE 'https://[^ ]+\.vercel\.app' /tmp/vercel-output.log | head -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"

      - name: Comment Vercel URL on Issue
        if: success()
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = '${{ needs.check-implement.outputs.pr-num }}';
            const deployUrl = process.env.DEPLOY_URL;
            if (!deployUrl) {
              console.log('No deploy URL to report');
              return;
            }
            // Find the parent issue from PR body or title
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt(prNum),
            });
            const body = pr.data.body || '';
            let issueNum = null;
            const match = body.match(/(?:Closes|parent)\s*#(\d+)/i);
            if (match) issueNum = parseInt(match[1]);
            if (!issueNum) {
              const titleMatch = pr.data.title.match(/\(parent\s*#(\d+)\)/i);
              if (titleMatch) issueNum = parseInt(titleMatch[1]);
            }
            if (issueNum) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                body: `🚀 Vercel: ${deployUrl}`,
              });
            }

  # Skip notification for non-implement merges
  skip-notify:
    needs: check-implement
    if: needs.check-implement.outputs.should-deploy != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Non-implement merge — deployment skipped."
