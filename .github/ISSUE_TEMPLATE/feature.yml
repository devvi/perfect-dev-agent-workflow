name: Feature Request
description: Propose a new feature or enhancement
title: "[Feature] "
labels: ["workflow/available", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This will auto-trigger the **Perfect Dev Agent Workflow**:
        Research → Plan → Implement → Test → Self-correct → Deploy

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What should this feature do?
      placeholder: |
        As a <user>,
        I want <goal>,
        so that <reason>.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context & Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: depth
    attributes:
      label: Research Depth
      options:
        - standard (default)
        - light (simple change)
        - deep (architecture/systems)
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Links, screenshots, references, constraints
