<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME BOY - SNAKE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
  }
  .gameboy {
    background: #c4c4c4;
    border: 4px solid #8a8a8a;
    border-radius: 24px 24px 32px 24px;
    padding: 32px 24px 24px;
    box-shadow:
      0 8px 0 #6b6b6b,
      0 12px 20px rgba(0,0,0,0.5);
    position: relative;
    width: 500px;
    max-width: 95vw;
  }
  .gameboy::after {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 8px;
    background: #a8a8a8;
    border-radius: 4px;
    border-bottom: 2px solid #8a8a8a;
  }
  .screen-section {
    background: #5a5a5a;
    border-radius: 12px 12px 24px 12px;
    padding: 16px 16px 20px;
    box-shadow: inset 0 -4px 0 #3a3a3a;
    position: relative;
  }
  .screen-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .screen-label span {
    font-size: 11px;
    font-weight: bold;
    color: #8a8a8a;
    letter-spacing: 2px;
  }
  .leds {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    box-shadow: inset 0 0 2px rgba(0,0,0,0.3);
  }
  .led-red { background: #e04040; }
  .led-green { background: #40c040; }
  .screen-bezel {
    background: #6b6b6b;
    border-radius: 8px;
    padding: 8px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
  }
  canvas {
    display: block;
    width: 400px;
    max-width: 100%;
    height: auto;
    image-rendering: pixelated;
    border-radius: 4px;
    background: #9bbc0f;
  }
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding: 0 12px;
  }
  .dpad {
    position: relative;
    width: 100px;
    height: 100px;
  }
  .dpad-btn {
    position: absolute;
    background: #2a2a2a;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 4px 0 #111;
  }
  .dpad-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #111; }
  .dpad-up { top: 0; left: 50%; transform: translateX(-50%); width: 32px; height: 32px; }
  .dpad-down { bottom: 0; left: 50%; transform: translateX(-50%); width: 32px; height: 32px; }
  .dpad-left { left: 0; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 6px 3px 3px 6px; }
  .dpad-right { right: 0; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 3px 6px 6px 3px; }
  .dpad-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    background: #2a2a2a;
    border-radius: 50%;
  }
  .dpad-arrow {
    color: #666;
    font-size: 14px;
    line-height: 32px;
    text-align: center;
    pointer-events: none;
  }
  .ab-buttons {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .ab-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #b0306a;
    box-shadow: 0 4px 0 #7a2048;
    color: #fff;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    font-family: monospace;
  }
  .ab-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #7a2048; }
  .ab-btn-b { background: #b0306a; box-shadow: 0 4px 0 #7a2048; }
  .ab-btn-b:active { box-shadow: 0 2px 0 #7a2048; }
  .start-select {
    display: flex;
    gap: 24px;
  }
  .ss-btn {
    background: #5a5a5a;
    border: none;
    border-radius: 12px;
    padding: 6px 16px;
    color: #888;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 3px 0 #3a3a3a;
    font-family: monospace;
  }
  .ss-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #3a3a3a; }
  .brand {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    font-weight: bold;
    color: #7a7a7a;
    letter-spacing: 4px;
  }
</style>
</head>
<body>
<div class="gameboy">
  <div class="screen-section">
    <div class="screen-label">
      <span>DOT MATRIX</span>
      <div class="leds">
        <div class="led led-red"></div>
        <div class="led led-green"></div>
      </div>
    </div>
    <div class="screen-bezel">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
  </div>
  <div class="controls">
    <div class="dpad">
      <button class="dpad-btn dpad-up" data-dir="UP"><div class="dpad-arrow">▲</div></button>
      <button class="dpad-btn dpad-down" data-dir="DOWN"><div class="dpad-arrow">▼</div></button>
      <button class="dpad-btn dpad-left" data-dir="LEFT"><div class="dpad-arrow">◀</div></button>
      <button class="dpad-btn dpad-right" data-dir="RIGHT"><div class="dpad-arrow">▶</div></button>
      <div class="dpad-center"></div>
    </div>
    <div class="ab-buttons">
      <button class="ab-btn ab-btn-b" id="btnB">B</button>
      <button class="ab-btn" id="btnA">A</button>
    </div>
  </div>
  <div class="brand">GAME BOY</div>
</div>

<script type="module">
import { createInitialState, startGame, tick, changeDirection, resetGame, DIR, GRID_SIZE } from '../src/gameboy-snake-engine.js';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const CELL = 400 / GRID_SIZE;

let state = createInitialState();
let intervalId = null;

function startLoop() {
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(() => {
    state = tick(state);
    render();
  }, 150);
}

function stopLoop() {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
}

function handleDir(dir) {
  if (state.gameState === 'idle') {
    state = startGame(state);
    state = changeDirection(state, dir);
    render();
    startLoop();
    return;
  }
  if (state.gameState === 'playing') {
    state = changeDirection(state, dir);
    render();
  }
}

function handleAction() {
  if (state.gameState === 'gameover' || state.gameState === 'won') {
    stopLoop();
    state = resetGame();
    render();
  }
}

document.addEventListener('keydown', (e) => {
  const keyMap = {
    ArrowUp: DIR.UP,
    ArrowDown: DIR.DOWN,
    ArrowLeft: DIR.LEFT,
    ArrowRight: DIR.RIGHT,
  };
  const dir = keyMap[e.key];
  if (dir) {
    e.preventDefault();
    handleDir(dir);
    return;
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    handleAction();
  }
});

document.querySelectorAll('[data-dir]').forEach(btn => {
  btn.addEventListener('click', () => {
    handleDir(DIR[btn.dataset.dir]);
  });
});

document.getElementById('btnA').addEventListener('click', handleAction);
document.getElementById('btnB').addEventListener('click', handleAction);

function render() {
  ctx.clearRect(0, 0, 400, 400);

  ctx.fillStyle = '#9bbc0f';
  ctx.fillRect(0, 0, 400, 400);

  ctx.strokeStyle = '#8bac0f';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID_SIZE; i++) {
    const pos = i * CELL;
    ctx.beginPath();
    ctx.moveTo(pos, 0);
    ctx.lineTo(pos, 400);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, pos);
    ctx.lineTo(400, pos);
    ctx.stroke();
  }

  const snake = state.snake;
  if (snake && snake.length > 0) {
    for (let i = 0; i < snake.length; i++) {
      const seg = snake[i];
      ctx.fillStyle = i === 0 ? '#8bac0f' : '#306230';
      ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
    }
  }

  const food = state.food;
  if (food && state.gameState !== 'gameover' && state.gameState !== 'won') {
    ctx.fillStyle = '#0f380f';
    ctx.fillRect(food.x * CELL + 4, food.y * CELL + 4, CELL - 8, CELL - 8);
  }

  ctx.fillStyle = '#0f380f';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(`SCORE: ${state.score}`, 200, 4);

  if (state.gameState === 'idle') {
    ctx.fillStyle = 'rgba(15,56,15,0.7)';
    ctx.fillRect(0, 0, 400, 400);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('PRESS ARROW KEY', 200, 180);
    ctx.fillText('TO START', 200, 210);
  }

  if (state.gameState === 'gameover') {
    ctx.fillStyle = 'rgba(15,56,15,0.7)';
    ctx.fillRect(0, 0, 400, 400);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GAME OVER', 200, 170);
    ctx.font = 'bold 16px monospace';
    ctx.fillText(`SCORE: ${state.score}`, 200, 210);
    ctx.font = '12px monospace';
    ctx.fillText('SPACE / ENTER TO RESTART', 200, 240);
  }

  if (state.gameState === 'won') {
    ctx.fillStyle = 'rgba(15,56,15,0.7)';
    ctx.fillRect(0, 0, 400, 400);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('YOU WIN!', 200, 170);
    ctx.font = 'bold 16px monospace';
    ctx.fillText(`SCORE: ${state.score}`, 200, 210);
    ctx.font = '12px monospace';
    ctx.fillText('SPACE / ENTER TO RESTART', 200, 240);
  }
}

render();
</script>
</body>
</html>
