<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 完美蛇踪 — 秘境探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;flex-direction:column}
h1{color:#e94560;font-size:24px;margin-bottom:8px;letter-spacing:4px;text-shadow:2px 2px #000}
.game-wrapper{position:relative;display:inline-block}
canvas#game{display:block;border:3px solid #16213e;image-rendering:pixelated;cursor:default}
.score-bar{display:flex;justify-content:space-between;width:406px;padding:4px 6px;background:#1a1a2e;margin-bottom:6px;color:#8bac0f;font-size:12px;border:1px solid #16213e}
.controls-info{color:#666;font-size:11px;margin-top:12px;text-align:center;line-height:1.6;max-width:400px}
.controls-info span{color:#e94560;background:#1a1a2e;padding:1px 6px;border-radius:3px;font-size:10px}
.footer{color:#444;font-size:10px;margin-top:16px}
/* Mobile responsive scaling */
body.mobile .game-wrapper{max-width:100vw;max-height:calc(100dvh - 120px);aspect-ratio:1/1}
body.mobile canvas#game{width:100%;height:100%}
.touch-controls{display:none;gap:16px;justify-content:center;margin-top:12px;touch-action:none;user-select:none;-webkit-user-select:none}
.touch-btn{width:72px;height:72px;border-radius:50%;border:2px solid #8bac0f;background:rgba(26,26,46,0.9);color:#e94560;font-size:14px;font-family:monospace;touch-action:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.touch-btn:active{background:#e94560;color:#1a1a2e}
body.mobile .score-bar{width:100%;max-width:406px}
body.mobile .controls-info{display:none}
</style>
</head>
<body>
<h1>🐍 完美蛇踪</h1>
<div class="score-bar">
  <span id="scoreDisplay">SCORE: 0</span>
  <span id="lengthDisplay">LEN: 3</span>
  <span id="keysDisplay">KEYS: 0</span>
</div>
<div class="game-wrapper">
  <canvas id="game" width="400" height="400"></canvas>
</div>
<div class="touch-controls" id="touchControls" style="display:none">
  <button class="touch-btn btn-z" data-action="fire">⚔️ Z</button>
  <button class="touch-btn btn-x" data-action="interact">🤝 X</button>
</div>
<div class="controls-info">
  <span>↑↓←→</span> 移动 &nbsp; <span>Z</span> 攻击(消耗长度) &nbsp; <span>X</span> 交互(抽奖/存档)<br>
  <span>Enter</span> 开始 &nbsp; <span>Shift</span> 暂停 &nbsp; <span>Space</span> 重新开始 &nbsp; <span>S</span> 读档
</div>
<div class="footer">🐍 探索 · 战斗 · 成长 — 到达 ★ 目标房间即可胜利</div>

<script>
  window.__COMMIT_INFO = {
    hash: "__COMMIT_HASH__",
    message: "__COMMIT_MSG__",
    date: "__COMMIT_DATE__"
  };
</script>

<script type="importmap">
{
  "imports": {
    "../engine/": "./src/engine/",
    "../render/": "./src/render/"
  }
}
</script>

<script type="module">
import { generateWorldMap, findRoomOfType } from './src/engine/generator.js';
import { getRoomAt } from './src/engine/world.js';
import {
  createInitialState, startGame, tick, changeDirection, fire, interact,
} from './src/engine/core.js';
import { render } from './src/render/renderer.js';
import { saveGame, loadGame, applySave, clearSave } from './src/engine/save.js';
import { DIR, ROOM_TYPE } from './src/engine/constants.js';

// --- DOM references ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const lengthDisplay = document.getElementById('lengthDisplay');
const keysDisplay = document.getElementById('keysDisplay');

// --- Game state ---
let state = null;
let gameLoop = null;
let gameRunning = false;

// --- Gyroscope Controller ---
class GyroscopeController {
  constructor() {
    this.enabled = false;
    this.lastDir = null;
    this.filteredGamma = 0;
    this.filteredBeta = 0;
    this.alpha = 0.3;
  }

  async init() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const permission = await DeviceOrientationEvent.requestPermission();
        if (permission !== 'granted') return false;
      } catch { return false; }
    }
    if (!window.DeviceOrientationEvent) return false;
    window.addEventListener('deviceorientation', (e) => this.onOrientation(e));
    this.enabled = true;
    return true;
  }

  onOrientation(e) {
    if (!this.enabled || !state) return;
    if (e.gamma === null || e.beta === null) return;

    this.filteredGamma = this.filteredGamma * (1 - this.alpha) + e.gamma * this.alpha;
    this.filteredBeta  = this.filteredBeta  * (1 - this.alpha) + e.beta  * this.alpha;

    const gamma = this.filteredGamma;
    const beta  = this.filteredBeta;

    let dir = null;
    if (Math.abs(gamma) > Math.abs(beta)) {
      if (gamma < -30) dir = DIR.LEFT;
      else if (gamma > 30) dir = DIR.RIGHT;
    } else {
      if (beta < -20) dir = DIR.UP;
      else if (beta > 20) dir = DIR.DOWN;
    }

    if (dir && dir !== this.lastDir && state && state.gameState === 'playing') {
      this.lastDir = dir;
      state = changeDirection(state, dir);
    }
  }

  reset() {
    this.lastDir = null;
    this.filteredGamma = 0;
    this.filteredBeta = 0;
  }
}

// --- Mobile detection and setup ---
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isMobile) {
  document.body.classList.add('mobile');
  const touchControls = document.getElementById('touchControls');
  if (touchControls) touchControls.style.display = 'flex';
}

// --- Touch swipe fallback ---
let touchStartX = 0;
let touchStartY = 0;

canvas.addEventListener('touchstart', (e) => {
  if (e.target.closest('.touch-btn')) return;
  const touch = e.touches[0];
  touchStartX = touch.clientX;
  touchStartY = touch.clientY;
}, { passive: true });

canvas.addEventListener('touchend', (e) => {
  if (touchStartX === 0) return;
  const touch = e.changedTouches[0];
  const dx = touch.clientX - touchStartX;
  const dy = touch.clientY - touchStartY;
  const minSwipe = 30;

  if (state && state.gameState === 'title') {
    // Tap (not swipe) on title screen → hit-test menu items
    if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) {
      const coords = getCanvasCoords(touch.clientX, touch.clientY, canvas, 400, 400);
      handleTitleTap(coords.x, coords.y);
    }
  } else if (state && state.gameState === 'playing') {
    let dir = null;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > minSwipe) dir = DIR.RIGHT;
      else if (dx < -minSwipe) dir = DIR.LEFT;
    } else {
      if (dy > minSwipe) dir = DIR.DOWN;
      else if (dy < -minSwipe) dir = DIR.UP;
    }
    if (dir) state = changeDirection(state, dir);
  }

  touchStartX = 0;
  touchStartY = 0;
});

// --- Touch Z/X buttons ---
document.querySelectorAll('.touch-btn').forEach(btn => {
  const action = btn.dataset.action;
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!state || state.gameState !== 'playing') return;
    if (action === 'fire') state = fire(state);
    else if (action === 'interact') state = interact(state);
    updateHUD();
  });
});

// --- Title screen touch/click support (Issue #138) ---
const MENU_Y = 340;
const LINE_HEIGHT = 22;
const CENTER_X = 200;
const HIT_WIDTH = 100;
const MENU_ITEMS = 2; // START GAME, ABOUT

function getCanvasCoords(clientX, clientY, canvasEl, canvasWidth, canvasHeight) {
  const rect = canvasEl.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (canvasWidth / rect.width),
    y: (clientY - rect.top) * (canvasHeight / rect.height),
  };
}

function hitTestMenuItem(canvasX, canvasY) {
  for (let i = 0; i < MENU_ITEMS; i++) {
    const yCenter = MENU_Y + i * LINE_HEIGHT;
    const inY = Math.abs(canvasY - yCenter) <= LINE_HEIGHT / 2;
    const inX = Math.abs(canvasX - CENTER_X) <= HIT_WIDTH;
    if (inY && inX) return i;
  }
  return -1;
}

function handleTitleTap(canvasX, canvasY) {
  if (!state || state.gameState !== 'title') return;
  if (state.menuMode === 'about') {
    state = { ...state, menuIndex: 0, menuMode: 'main' };
    render(ctx, state);
    return;
  }
  const item = hitTestMenuItem(canvasX, canvasY);
  if (item === 0) {
    start(); // START GAME
  } else if (item === 1) {
    state = { ...state, menuMode: 'about' }; // ABOUT
    render(ctx, state);
  }
}

canvas.addEventListener('click', (e) => {
  const coords = getCanvasCoords(e.clientX, e.clientY, canvas, 400, 400);
  handleTitleTap(coords.x, coords.y);
});

// --- Initialize gyroscope ---
const gyro = new GyroscopeController();
gyro.init().then(enabled => {
  if (enabled) console.log('🔄 Gyroscope enabled');
});

// --- Initialize ---
function init() {
  if (gameLoop) {
    clearTimeout(gameLoop);
    gameLoop = null;
  }

  const world = generateWorldMap(5, 5);
  state = createInitialState(world);
  gyro.reset();

  updateHUD();
  render(ctx, state);
  gameRunning = false;
}

// --- Start game ---
function start() {
  if (!state || state.gameState === 'playing') return;
  state = startGame(state);
  gameRunning = true;

  // Start game loop
  if (gameLoop) clearTimeout(gameLoop);
  runTick();
}

// --- Game tick ---
function tickFn() {
  if (!state || state.gameState !== 'playing') {
    // Still render even when not playing (for overlays)
    if (state) render(ctx, state);
    return;
  }

  state = tick(state);
  updateHUD();
  render(ctx, state);

  // Test hooks for Playwright E2E
  if (typeof window !== 'undefined') {
    window.__GAME_STATE__ = () => state;
    window.__GAME_API__ = {
      getState: () => state,
      teleport: (rx, ry) => {
        if (!state || !state.world) return null;
        const room = state.world.rooms[ry] && state.world.rooms[ry][rx];
        if (!room) return null;
        state = { ...state, currentRoom: { x: rx, y: ry }, gameState: 'playing', bossIntroData: null };
        return state.gameState;
      },
      getBossRoom: () => {
        if (!state || !state.world) return null;
        for (let y = 0; y < state.world.rows; y++)
          for (let x = 0; x < state.world.cols; x++)
            if (state.world.rooms[y][x].type === 'boss' || state.world.rooms[y][x].bossRoom)
              return { x, y };
        return null;
      },
      simulateKey: (code) => {
        if (!state) return;
        if (code === 'Space' || code === 'Enter') {
          if (state.gameState === 'bossIntro') {
            state = changeDirection(state, { x: 0, y: 1 });
          } else if (state.gameState === 'title') {
            const event = new KeyboardEvent('keydown', { code: 'Space' });
            document.dispatchEvent(event);
          }
        }
      },
      tick: (n = 1) => {
        for (let i = 0; i < n; i++) {
          if (state) state = tick(state);
        }
        return state ? state.gameState : null;
      },
    };
  }

  // Handle game over or won
  if (state.gameState === 'gameover' || state.gameState === 'won') {
    if (gameLoop) {
      clearTimeout(gameLoop);
      gameLoop = null;
    }
  }
}

function scheduleNextTick() {
  if (!state || state.gameState !== 'playing') return;
  const interval = state.currentTickInterval || 150;
  gameLoop = setTimeout(() => {
    if (!state) return;
    tickFn();
    if (state.gameState === 'playing') {
      scheduleNextTick();
    }
  }, interval);
}

function runTick() {
  if (gameLoop) {
    clearTimeout(gameLoop);
    gameLoop = null;
  }

  // First tick immediately
  tickFn();

  // Then schedule next tick with current interval
  scheduleNextTick();
}

// --- Update HUD ---
function updateHUD() {
  if (!state) return;
  scoreDisplay.textContent = 'SCORE: ' + state.score;
  lengthDisplay.textContent = 'LEN: ' + state.snake.length;
  keysDisplay.textContent = 'KEYS: ' + state.keysFound.size;
}

// --- Input handling ---
document.addEventListener('keydown', (e) => {
  if (!state) return;

  // Title screen: interactive menu
  if (state.gameState === 'title') {
    // ABOUT screen: any key returns to main menu
    if (state.menuMode === 'about') {
      e.preventDefault();
      state = { ...state, menuIndex: 0, menuMode: 'main' };
      render(ctx, state);
      return;
    }

    // Main menu: navigation
    if (e.code === 'ArrowUp' || e.code === 'ArrowDown') {
      e.preventDefault();
      const direction = e.code === 'ArrowUp' ? -1 : 1;
      const itemCount = 2; // START GAME, ABOUT
      const newIndex = (state.menuIndex + direction + itemCount) % itemCount;
      state = { ...state, menuIndex: newIndex };
      render(ctx, state);
      return;
    }

    // Main menu: selection
    if (e.code === 'Enter' || e.code === 'Space') {
      e.preventDefault();
      if (state.menuIndex === 0) {
        start(); // START GAME → transitions to playing
      } else {
        // ABOUT → switch to about screen
        state = { ...state, menuMode: 'about' };
        render(ctx, state);
      }
      return;
    }
  }

  // Boss intro: space/enter to start the fight
  if (state.gameState === 'bossIntro') {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      state = changeDirection(state, { x: 0, y: 1 });
      render(ctx, state);
      return;
    }
  }

  // Game over / Won: space or enter to restart
  if (state.gameState === 'gameover' || state.gameState === 'won') {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      init();
      return;
    }
    if (e.code === 'KeyS' && state.gameState === 'gameover' && state.savePoint) {
      e.preventDefault();
      const saveData = loadGame();
      if (saveData) {
        const restored = applySave(saveData);
        state = restored.state;
        state.gameState = 'playing';
        gameRunning = true;
        updateHUD();
        runTick();
      }
      return;
    }
  }

  // Playing state
  if (state.gameState === 'playing') {
    // Direction
    let dir = null;
    switch (e.code) {
      case 'ArrowUp':    dir = DIR.UP; break;
      case 'ArrowDown':  dir = DIR.DOWN; break;
      case 'ArrowLeft':  dir = DIR.LEFT; break;
      case 'ArrowRight': dir = DIR.RIGHT; break;
      case 'KeyZ':       // Fire
        e.preventDefault();
        state = fire(state);
        updateHUD();
        return;
      case 'KeyX':       // Interact
        e.preventDefault();
        state = interact(state);
        updateHUD();
        return;
      case 'ShiftLeft':
      case 'ShiftRight':
        e.preventDefault();
        state = { ...state, gameState: state.gameState === 'paused' ? 'playing' : 'paused' };
        if (state.gameState === 'playing') {
          runTick();
        } else {
          if (gameLoop) clearTimeout(gameLoop);
          render(ctx, state);
        }
        return;
      case 'Escape':
        e.preventDefault();
        state = { ...state, gameState: 'paused' };
        if (gameLoop) clearTimeout(gameLoop);
        render(ctx, state);
        return;
    }

    if (dir) {
      e.preventDefault();
      state = changeDirection(state, dir);
    }
  }
});

// --- Save game periodically when playing ---
setInterval(() => {
  if (state && state.gameState === 'playing') {
    // Auto-save every 30 seconds
    saveGame(state, state.world);
  }
}, 30000);

// --- Init on load ---
init();

console.log('🐍 Metroidvania Snake loaded!');
console.log('Controls: Arrows=Move, Z=Fire, X=Interact, Enter=Start, Shift=Pause');
console.log('📱 Mobile support: touch buttons, gyroscope, swipe');
</script>
</body>
</html>
