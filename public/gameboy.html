<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 银河蛇 — Metroidvania Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;flex-direction:column}
h1{color:#e94560;font-size:24px;margin-bottom:8px;letter-spacing:4px;text-shadow:2px 2px #000}
.game-wrapper{position:relative;display:inline-block}
canvas#game{display:block;border:3px solid #16213e;image-rendering:pixelated;cursor:default}
.score-bar{display:flex;justify-content:space-between;width:406px;padding:4px 6px;background:#1a1a2e;margin-bottom:6px;color:#8bac0f;font-size:12px;border:1px solid #16213e}
.controls-info{color:#666;font-size:11px;margin-top:12px;text-align:center;line-height:1.6;max-width:400px}
.controls-info span{color:#e94560;background:#1a1a2e;padding:1px 6px;border-radius:3px;font-size:10px}
.footer{color:#444;font-size:10px;margin-top:16px}
</style>
</head>
<body>
<h1>🐍 银河蛇</h1>
<div class="score-bar">
  <span id="scoreDisplay">SCORE: 0</span>
  <span id="lengthDisplay">LEN: 3</span>
  <span id="keysDisplay">KEYS: 0</span>
</div>
<div class="game-wrapper">
  <canvas id="game" width="400" height="400"></canvas>
</div>
<div class="controls-info">
  <span>↑↓←→</span> 移动 &nbsp; <span>Z</span> 攻击(消耗长度) &nbsp; <span>X</span> 交互(抽奖/存档)<br>
  <span>Enter</span> 开始 &nbsp; <span>Shift</span> 暂停 &nbsp; <span>Space</span> 重新开始 &nbsp; <span>S</span> 读档
</div>
<div class="footer">🐍 探索 · 战斗 · 成长 — 到达 ★ 目标房间即可胜利</div>

<script type="importmap">
{
  "imports": {
    "../engine/": "./src/engine/",
    "../render/": "./src/render/"
  }
}
</script>

<script type="module">
import { generateWorldMap, findRoomOfType } from './src/engine/generator.js';
import { getRoomAt } from './src/engine/world.js';
import {
  createInitialState, startGame, tick, changeDirection, fire, interact,
} from './src/engine/core.js';
import { render } from './src/render/renderer.js';
import { saveGame, loadGame, applySave, clearSave } from './src/engine/save.js';
import { DIR, ROOM_TYPE } from './src/engine/constants.js';

// --- DOM references ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const lengthDisplay = document.getElementById('lengthDisplay');
const keysDisplay = document.getElementById('keysDisplay');

// --- Game state ---
let state = null;
let gameLoop = null;
let gameRunning = false;

// --- Initialize ---
function init() {
  if (gameLoop) {
    clearTimeout(gameLoop);
    gameLoop = null;
  }

  const world = generateWorldMap(5, 5);
  state = createInitialState(world);

  updateHUD();
  render(ctx, state);
  gameRunning = false;
}

// --- Start game ---
function start() {
  if (!state || state.gameState === 'playing') return;
  state = startGame(state);
  gameRunning = true;

  // Start game loop
  if (gameLoop) clearTimeout(gameLoop);
  runTick();
}

// --- Game tick ---
function tickFn() {
  if (!state || state.gameState !== 'playing') {
    // Still render even when not playing (for overlays)
    if (state) render(ctx, state);
    return;
  }

  state = tick(state);
  updateHUD();
  render(ctx, state);

  // Handle game over or win
  if (state.gameState === 'gameover' || state.gameState === 'won') {
    if (gameLoop) {
      clearTimeout(gameLoop);
      gameLoop = null;
    }
  }
}

function scheduleNextTick() {
  if (!state || state.gameState !== 'playing') return;
  const interval = state.currentTickInterval || 150;
  gameLoop = setTimeout(() => {
    if (!state) return;
    tickFn();
    if (state.gameState === 'playing') {
      scheduleNextTick();
    }
  }, interval);
}

function runTick() {
  if (gameLoop) {
    clearTimeout(gameLoop);
    gameLoop = null;
  }

  // First tick immediately
  tickFn();

  // Then schedule next tick with current interval
  scheduleNextTick();
}

// --- Update HUD ---
function updateHUD() {
  if (!state) return;
  scoreDisplay.textContent = 'SCORE: ' + state.score;
  lengthDisplay.textContent = 'LEN: ' + state.snake.length;
  keysDisplay.textContent = 'KEYS: ' + state.keysFound.size;
}

// --- Input handling ---
document.addEventListener('keydown', (e) => {
  if (!state) return;

  // Title screen: any arrow or enter starts game
  if (state.gameState === 'title') {
    if (e.code === 'Enter' || e.code === 'Space' || e.code.startsWith('Arrow')) {
      e.preventDefault();
      start();
      return;
    }
  }

  // Game over / Won: space or enter to restart
  if (state.gameState === 'gameover' || state.gameState === 'won') {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      init();
      return;
    }
    if (e.code === 'KeyS' && state.gameState === 'gameover' && state.savePoint) {
      e.preventDefault();
      const saveData = loadGame();
      if (saveData) {
        const restored = applySave(saveData);
        state = restored.state;
        state.gameState = 'playing';
        gameRunning = true;
        updateHUD();
        runTick();
      }
      return;
    }
  }

  // Playing state
  if (state.gameState === 'playing') {
    // Direction
    let dir = null;
    switch (e.code) {
      case 'ArrowUp':    dir = DIR.UP; break;
      case 'ArrowDown':  dir = DIR.DOWN; break;
      case 'ArrowLeft':  dir = DIR.LEFT; break;
      case 'ArrowRight': dir = DIR.RIGHT; break;
      case 'KeyZ':       // Fire
        e.preventDefault();
        state = fire(state);
        updateHUD();
        return;
      case 'KeyX':       // Interact
        e.preventDefault();
        state = interact(state);
        updateHUD();
        return;
      case 'ShiftLeft':
      case 'ShiftRight':
        e.preventDefault();
        state = { ...state, gameState: state.gameState === 'paused' ? 'playing' : 'paused' };
        if (state.gameState === 'playing') {
          runTick();
        } else {
          if (gameLoop) clearTimeout(gameLoop);
          render(ctx, state);
        }
        return;
      case 'Escape':
        e.preventDefault();
        state = { ...state, gameState: 'paused' };
        if (gameLoop) clearTimeout(gameLoop);
        render(ctx, state);
        return;
    }

    if (dir) {
      e.preventDefault();
      state = changeDirection(state, dir);
    }
  }
});

// --- Save game periodically when playing ---
setInterval(() => {
  if (state && state.gameState === 'playing') {
    // Auto-save every 30 seconds
    saveGame(state, state.world);
  }
}, 30000);

// --- Init on load ---
init();

console.log('🐍 Metroidvania Snake loaded!');
console.log('Controls: Arrows=Move, Z=Fire, X=Interact, Enter=Start, Shift=Pause');
</script>
</body>
</html>
