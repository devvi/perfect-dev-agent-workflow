name: Feature Request
description: 提交一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交功能请求！工作流会自动处理。

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: 你想实现什么功能？请描述现状和期望。
      placeholder: |
        比如：给游戏添加一个排行榜系统。
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context & Motivation
      description: 为什么要做这个改动？有什么背景？
      placeholder: |
        玩家反馈没有排行榜，缺少竞争动力。
    validations:
      required: false

  - type: dropdown
    id: depth
    attributes:
      label: 工作深度
      description: 你希望这个 Issue 的研究/实现深度？
      options:
        - auto（由系统自动判断）
        - light（简单改动，快速完成）
        - standard（正常功能，标准流程）
        - deep（复杂系统变更，需要深入调研）
      default: 0
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个 Issue 的紧急程度
      options:
        - medium（正常优先级）
        - critical（阻塞性 Bug，必须立即处理）
        - high（重要功能，下个版本必须）
        - low（锦上添花，有空再做）
      default: 0
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: 如果这个 Issue 依赖其他 Issue 先完成，在这里列出
      placeholder: "Depends on: #42\nDepends on (design): #49"
      value: "Depends on: #"
    validations:
      required: false

  - type: checkboxes
    id: research-options
    attributes:
      label: 研究选项
      description: 控制 research 阶段的行为
      options:
        - label: 搜索 Obsidian 知识库（勾选后强制搜索我的设计笔记，不受 depth 限制。不勾选时仅 standard/deep 深度会自动搜索。）
          required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: 其他补充信息、参考链接、截图等。
      placeholder: 比如 Obsidian 里相关的笔记名称
    validations:
      required: false
