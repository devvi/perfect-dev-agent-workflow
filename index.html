<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;flex-direction:column}
h1{color:#e94560;font-size:28px;margin-bottom:10px;letter-spacing:4px;text-shadow:2px 2px #000}
.score{color:#0f3460;font-size:18px;margin-bottom:16px}
canvas{border:3px solid #16213e;image-rendering:pixelated;background:#1a1a2e}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;flex-direction:column;z-index:10}
.overlay.active{display:flex}
.overlay h2{color:#fff;font-size:32px;margin-bottom:12px}
.overlay p{color:#ccc;font-size:18px;margin-bottom:20px}
.overlay button{background:#e94560;color:#fff;border:none;padding:10px 30px;font-size:16px;cursor:pointer;font-family:monospace;letter-spacing:2px}
.overlay button:hover{background:#ff6b81}
</style>
</head>
<body>
<h1>🐍 像素贪吃蛇</h1>
<div class="score">分数: <span id="score">0</span></div>
<canvas id="game" width="400" height="400"></canvas>
<div class="overlay" id="overlay">
  <h2 id="overlayTitle">游戏结束</h2>
  <p id="overlayScore"></p>
  <button id="restartBtn" onclick="restart()">重新开始</button>
</div>
<script>
const COLS=20,ROWS=20,CELL=20,SPEED=150;
let snake,dir,nextDir,food,score,loop,gameOver;

function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;gameOver=false;
  document.getElementById('score').textContent=0;
  document.getElementById('overlay').classList.remove('active');
  spawnFood();
  clearInterval(loop);
  loop=setInterval(tick,SPEED);
}

function spawnFood(){
  do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function tick(){
  dir=nextDir;
  let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y))return end();
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score+=10;document.getElementById('score').textContent=score;spawnFood()}
  else snake.pop();
  draw();
}

function draw(){
  let c=document.getElementById('game'),ctx=c.getContext('2d');
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,400,400);
  ctx.fillStyle='#16213e';
  for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++)if((x+y)%2)ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
  snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#e94560':'#0f3460';ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2)});
  ctx.fillStyle='#f0c040';ctx.fillRect(food.x*CELL+4,food.y*CELL+4,CELL-8,CELL-8);
}

function end(){
  gameOver=true;clearInterval(loop);
  document.getElementById('overlayTitle').textContent='游戏结束';
  document.getElementById('overlayScore').textContent='最终分数: '+score;
  document.getElementById('overlay').classList.add('active');
}

function restart(){init()}

document.addEventListener('keydown',e=>{
  if(gameOver&&e.code==='Space'){restart();return}
  let k={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}}[e.code];
  if(k&&!(k.x+dir.x===0&&k.y+dir.y===0))nextDir=k;
  e.preventDefault();
});

init();
</script>
</body>
</html>
